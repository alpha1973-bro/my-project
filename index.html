<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title> 
     <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #333;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome 👋</h1>
        <p>This is my first GitHub website!</p>

        <a class="btn" href="https://github.com" target="_blank">
            Visit GitHub
        </a>
    </div>
</head>
<body>
    <h1>Hello, GitHub!</h1>
    <p>This is my first web page.</p>
</body>
</html>
